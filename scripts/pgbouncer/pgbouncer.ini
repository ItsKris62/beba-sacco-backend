; ─────────────────────────────────────────────────────────────────────────────
; PgBouncer Configuration – Phase 5 SRE
;
; Connection pooling for PostgreSQL with read/write split.
; Supports Multi-AZ failover with DNS-based primary rotation.
;
; Deployment: Run as sidecar or standalone service.
; ─────────────────────────────────────────────────────────────────────────────

[databases]
; Primary (writes) – update host on failover
beba_primary = host=pg-primary.beba.internal port=5432 dbname=beba auth_user=beba_app pool_mode=transaction pool_size=25

; Replica (reads) – load balanced across replicas
beba_replica = host=pg-replica.beba.internal port=5432 dbname=beba auth_user=beba_app pool_mode=transaction pool_size=50

; Fallback: Direct connection if PgBouncer is bypassed
beba = host=pg-primary.beba.internal port=5432 dbname=beba auth_user=beba_app pool_mode=transaction pool_size=30

[pgbouncer]
; ── Listening ────────────────────────────────────────────────────────────────
listen_addr = 0.0.0.0
listen_port = 6432
unix_socket_dir = /var/run/pgbouncer

; ── Authentication ───────────────────────────────────────────────────────────
auth_type = scram-sha-256
auth_file = /etc/pgbouncer/userlist.txt
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

; ── Pool Settings ────────────────────────────────────────────────────────────
pool_mode = transaction
default_pool_size = 25
min_pool_size = 5
reserve_pool_size = 5
reserve_pool_timeout = 3
max_client_conn = 200
max_db_connections = 50

; ── Timeouts ─────────────────────────────────────────────────────────────────
server_connect_timeout = 5
server_login_retry = 3
query_timeout = 30
query_wait_timeout = 60
client_idle_timeout = 300
client_login_timeout = 15
idle_transaction_timeout = 60
server_idle_timeout = 120

; ── Connection Lifetime ──────────────────────────────────────────────────────
server_lifetime = 3600
server_check_delay = 10
server_check_query = SELECT 1

; ── Logging ──────────────────────────────────────────────────────────────────
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
stats_period = 60
logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid

; ── TLS ──────────────────────────────────────────────────────────────────────
; Uncomment for production TLS
; client_tls_sslmode = require
; client_tls_cert_file = /etc/pgbouncer/server.crt
; client_tls_key_file = /etc/pgbouncer/server.key
; server_tls_sslmode = verify-full
; server_tls_ca_file = /etc/pgbouncer/ca.crt

; ── Admin ────────────────────────────────────────────────────────────────────
admin_users = pgbouncer_admin
stats_users = pgbouncer_stats
