# Beba SACCO – Local Development Stack
#
# Services
#   core    : postgres, redis, minio          (always up)
#   app     : nestjs backend                  (always up, depends on core)
#   tools   : pgadmin, redis-commander        (profile: tools – opt-in)
#
# Usage
#   Start core + app:          docker compose up -d
#   Start with admin tools:    docker compose --profile tools up -d
#   Rebuild app image:         docker compose up -d --build app
#   Tail logs:                 docker compose logs -f app
#   Destroy everything:        docker compose down -v

name: beba-sacco

# ── Shared re-usable fragment ─────────────────────────────────────────────────
x-restart-policy: &restart-policy
  restart: unless-stopped

x-logging: &default-logging
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

# ─────────────────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL 15 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: beba_postgres
    <<: [*restart-policy, *default-logging]
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-beba}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-beba_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-bebadb}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-beba} -d ${POSTGRES_DB:-bebadb}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - beba_net

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: beba_redis
    <<: [*restart-policy, *default-logging]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-beba_redis_secret}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --loglevel warning
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-beba_redis_secret}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - beba_net

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: beba_minio
    <<: [*restart-policy, *default-logging]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-beba_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-beba_minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - "${MINIO_API_PORT:-9000}:9000"     # S3 API
      - "${MINIO_CONSOLE_PORT:-9001}:9001" # Web console
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - beba_net

  # ── MinIO bucket initializer ───────────────────────────────────────────────
  # Runs once after minio is healthy, creates the default bucket, then exits.
  minio-init:
    image: minio/mc:latest
    container_name: beba_minio_init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-beba_minio} ${MINIO_ROOT_PASSWORD:-beba_minio_secret};
        mc mb --ignore-existing local/${MINIO_BUCKET:-beba-documents};
        mc anonymous set none local/${MINIO_BUCKET:-beba-documents};
        echo 'MinIO bucket ready';
      "
    networks:
      - beba_net

  # ── NestJS Application ─────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    container_name: beba_app
    <<: [*restart-policy, *default-logging]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      API_PREFIX: ${API_PREFIX:-api}
      APP_NAME: ${APP_NAME:-Beba SACCO Backend}

      # Database – use local postgres in Docker; override with Neon URL externally
      DATABASE_URL: postgresql://${POSTGRES_USER:-beba}:${POSTGRES_PASSWORD:-beba_dev_secret}@postgres:5432/${POSTGRES_DB:-bebadb}?schema=public

      # Redis – local container; override with Upstash externally
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-beba_redis_secret}
      REDIS_TLS: "false"

      # JWT
      JWT_SECRET: ${JWT_SECRET:-change_me_in_production_jwt_secret_min_32_chars}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION:-15m}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change_me_in_production_refresh_secret_min_32}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION:-7d}

      # MinIO / S3 (Cloudflare R2-compatible)
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-local}
      R2_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-beba_minio}
      R2_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-beba_minio_secret}
      R2_BUCKET_NAME: ${MINIO_BUCKET:-beba-documents}
      R2_PUBLIC_URL: http://localhost:${MINIO_API_PORT:-9000}/${MINIO_BUCKET:-beba-documents}
      R2_ENDPOINT: http://minio:9000

      # M-Pesa Daraja (sandbox defaults)
      MPESA_CONSUMER_KEY: ${MPESA_CONSUMER_KEY:-}
      MPESA_CONSUMER_SECRET: ${MPESA_CONSUMER_SECRET:-}
      MPESA_PASSKEY: ${MPESA_PASSKEY:-}
      MPESA_SHORTCODE: ${MPESA_SHORTCODE:-174379}
      MPESA_CALLBACK_URL: ${MPESA_CALLBACK_URL:-}
      MPESA_ENVIRONMENT: ${MPESA_ENVIRONMENT:-sandbox}

      # Optional services (blank = disabled)
      SENTRY_DSN: ${SENTRY_DSN:-}
      TINYBIRD_TOKEN: ${TINYBIRD_TOKEN:-}
    ports:
      - "${APP_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - beba_net

  # ── pgAdmin 4 (optional – profile: tools) ─────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: beba_pgadmin
    profiles: [tools]
    <<: *restart-policy
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@beba.local}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - beba_net

  # ── Redis Commander (optional – profile: tools) ────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: beba_redis_commander
    profiles: [tools]
    <<: *restart-policy
    environment:
      REDIS_HOSTS: local:redis:6379:0:${REDIS_PASSWORD:-beba_redis_secret}
      HTTP_USER: ${REDIS_COMMANDER_USER:-admin}
      HTTP_PASSWORD: ${REDIS_COMMANDER_PASSWORD:-admin}
    ports:
      - "${REDIS_COMMANDER_PORT:-8081}:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - beba_net

# ─────────────────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  minio_data:
    driver: local
  pgadmin_data:
    driver: local

networks:
  beba_net:
    driver: bridge
