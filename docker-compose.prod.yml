# Beba SACCO – Production Stack
#
# Services
#   core     : postgres, redis              (data tier)
#   app      : nestjs backend               (application tier)
#   storage  : minio                        (object storage)
#   proxy    : nginx reverse proxy          (ingress)
#   observ   : prometheus, bull-board       (observability)
#
# Usage
#   Pull latest image:  docker compose -f docker-compose.prod.yml pull app
#   Start all:          docker compose -f docker-compose.prod.yml up -d
#   Apply migrations:   docker compose -f docker-compose.prod.yml exec app npm run prisma:deploy
#   View logs:          docker compose -f docker-compose.prod.yml logs -f app
#   Rolling restart:    docker compose -f docker-compose.prod.yml up -d --no-deps app
#   Rollback image:     IMAGE_TAG=v1.2.2 docker compose -f docker-compose.prod.yml up -d --no-deps app

name: beba-sacco-prod

x-restart-policy: &restart-policy
  restart: always

x-logging: &logging
  logging:
    driver: json-file
    options:
      max-size: "20m"
      max-file: "5"

services:

  # ── NestJS Application ─────────────────────────────────────────────────────
  app:
    image: ghcr.io/${GITHUB_REPOSITORY:-beba/backend}:${IMAGE_TAG:-latest}
    container_name: beba_app_prod
    <<: [*restart-policy, *logging]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      PORT: 3000
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health/ping || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s
    networks:
      - beba_prod_net
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M

  # ── PostgreSQL 15 ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: beba_postgres_prod
    <<: [*restart-policy, *logging]
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - beba_prod_net

  # ── Redis 7 ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: beba_redis_prod
    <<: [*restart-policy, *logging]
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 60 1
      --save 300 10
      --appendonly yes
      --loglevel warning
    volumes:
      - redis_prod_data:/data
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - beba_prod_net

  # ── MinIO (S3-compatible object storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: beba_minio_prod
    <<: [*restart-policy, *logging]
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_prod_data:/data
    expose:
      - "9000"
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 30s
    networks:
      - beba_prod_net
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ── MinIO bucket initializer ───────────────────────────────────────────────
  minio-init:
    image: minio/mc:latest
    container_name: beba_minio_init_prod
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
        mc alias set local http://minio:9000 ${MINIO_ROOT_USER} ${MINIO_ROOT_PASSWORD};
        mc mb --ignore-existing local/${R2_BUCKET_NAME:-beba-documents};
        mc anonymous set none local/${R2_BUCKET_NAME:-beba-documents};
        echo 'MinIO bucket ready';
      "
    networks:
      - beba_prod_net

  # ── Nginx Reverse Proxy ─────────────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: beba_nginx_prod
    <<: [*restart-policy, *logging]
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    networks:
      - beba_prod_net

  # ── Prometheus ─────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.51.0
    container_name: beba_prometheus_prod
    <<: [*restart-policy, *logging]
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_prod_data:/prometheus
    expose:
      - "9090"
    depends_on:
      app:
        condition: service_healthy
    networks:
      - beba_prod_net

  # ── Bull Board (BullMQ dashboard) ──────────────────────────────────────────
  bull-board:
    image: ghcr.io/felixmosh/bull-board:latest
    container_name: beba_bull_board_prod
    <<: [*restart-policy, *logging]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      BULL_BOARD_PORT: "3030"
      BULL_BOARD_USER_LOGIN: ${BULL_BOARD_USER:-admin}
      BULL_BOARD_USER_PASSWORD: ${BULL_BOARD_PASSWORD}
    expose:
      - "3030"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - beba_prod_net

volumes:
  postgres_prod_data:
    driver: local
  redis_prod_data:
    driver: local
  minio_prod_data:
    driver: local
  prometheus_prod_data:
    driver: local

networks:
  beba_prod_net:
    driver: bridge
