worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uid=$http_x_request_id';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ───────────────────────────────────────────────────────────
    sendfile            on;
    tcp_nopush          on;
    tcp_nodelay         on;
    keepalive_timeout   65;
    server_tokens       off;

    # Gzip
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   6;
    gzip_min_length   1000;
    gzip_types        text/plain text/css application/json application/javascript
                      text/xml application/xml text/javascript;

    # ── Upload size (Cloudflare R2 document uploads) ──────────────────────────
    client_max_body_size 20M;

    # ── Rate limiting zones ───────────────────────────────────────────────────
    # General API: 60 req/s per IP (burst to 120)
    limit_req_zone $binary_remote_addr zone=api:10m rate=60r/s;
    # Auth endpoints: tighter — 5 req/s per IP (burst to 10)
    limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/s;

    # ── Upstream ──────────────────────────────────────────────────────────────
    upstream nestjs_app {
        server app:3000;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;
        server_name beba-sacco.com www.beba-sacco.com;

        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS ─────────────────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        http2 on;
        server_name beba-sacco.com www.beba-sacco.com;

        # ── TLS certificates (Let's Encrypt / manual) ─────────────────────────
        # Place cert files in ./nginx/certs/ before starting the stack:
        #   fullchain.pem  — certificate chain (cert + intermediates)
        #   privkey.pem    — private key
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;

        # ── TLS hardening ─────────────────────────────────────────────────────
        ssl_protocols             TLSv1.2 TLSv1.3;
        ssl_ciphers               ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
        ssl_prefer_server_ciphers off;
        ssl_session_cache         shared:SSL:10m;
        ssl_session_timeout       1d;
        ssl_session_tickets       off;
        ssl_stapling              on;
        ssl_stapling_verify       on;
        resolver                  1.1.1.1 8.8.8.8 valid=300s;
        resolver_timeout          5s;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options           "DENY"                always;
        add_header X-Content-Type-Options    "nosniff"             always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;

        # ── Proxy common settings ─────────────────────────────────────────────
        proxy_http_version      1.1;
        proxy_set_header        Host              $host;
        proxy_set_header        X-Real-IP         $remote_addr;
        proxy_set_header        X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_set_header        Connection        "";
        proxy_connect_timeout   10s;
        proxy_send_timeout      60s;
        proxy_read_timeout      60s;
        proxy_buffer_size       8k;
        proxy_buffers           8 16k;
        proxy_busy_buffers_size 32k;

        # ── Auth endpoints — tight rate limit ─────────────────────────────────
        location ~ ^/api/auth/(login|register|refresh) {
            limit_req zone=auth burst=10 nodelay;
            limit_req_status 429;

            proxy_pass http://nestjs_app;
        }

        # ── Prometheus metrics — internal only (block from public internet) ───
        location = /api/metrics {
            allow 172.16.0.0/12;   # Docker bridge networks
            allow 10.0.0.0/8;
            deny  all;
            proxy_pass http://nestjs_app;
        }

        # ── Health probes — no rate limit ─────────────────────────────────────
        location ~ ^/api/health {
            proxy_pass http://nestjs_app;
        }

        # ── All other API routes ───────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=120 nodelay;
            limit_req_status 429;

            proxy_pass http://nestjs_app;
        }

        # ── Block everything else ─────────────────────────────────────────────
        location / {
            return 404;
        }
    }
}
